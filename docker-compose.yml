services:
  postgres:
    image: postgres:16-alpine
    container_name: catalogo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123456"
      POSTGRES_DB: catalogo_db
    ports:
      - "5432:5432"
    volumes:
      - catalogo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d catalogo_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  catalogo_pgdata:
