<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Cadastro de usuário — Catálogo')}">
    <title>Cadastro</title>
</head>

<body class="app-body">
<div class="app-shell">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <div class="app-shell__main"
         th:with="formDesc='Somente administradores podem criar contas e definir o perfil de acesso.'">
        <header th:replace="~{fragments/layout :: mainTopbar}"></header>
        <header th:replace="~{fragments/layout :: contentHeader('Cadastrar usuário', ${formDesc})}"></header>

        <main class="page page--narrow">
            <div class="card">
                <div class="card__header">
                    <h2 class="card__heading">Dados do usuário</h2>
                </div>
                <div class="card__body">
                    <div th:if="${param.sucesso}" class="alert alert--success">
                        Usuário cadastrado com sucesso.
                    </div>

                    <div th:if="${param.erro}" class="alert alert--error">
                        Não foi possível cadastrar o usuário.
                    </div>

                    <form th:action="@{/usuarios/salvar}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="field">
                            <label for="nomeCompleto">Nome completo</label>
                            <input id="nomeCompleto" type="text" name="nomeCompleto" required>
                        </div>

                        <div class="field">
                            <label for="username">Usuário</label>
                            <input id="username" type="text" name="username" required>
                        </div>

                        <div class="field">
                            <label for="email">E-mail</label>
                            <input id="email" type="email" name="email" required>
                        </div>

                        <div class="field">
                            <label for="senha">Senha</label>
                            <input id="senha" type="password" name="senha" minlength="4" required>
                        </div>

                        <div class="field">
                            <label for="confirmarSenha">Confirmar senha</label>
                            <input id="confirmarSenha" type="password" name="confirmarSenha" minlength="4" required>
                        </div>

                        <div class="field">
                            <label for="perfil">Perfil</label>
                            <select id="perfil" name="perfil">
                                <option value="USER">Usuário</option>
                                <option value="ADMIN">Administrador</option>
                            </select>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn--success">Cadastrar usuário</button>
                            <a th:href="@{/painel}">Voltar ao painel</a>
                        </div>
                    </form>

                    <div class="footer-links">
                        <a th:href="@{/login}">Ir para o login</a>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
</body>
</html>
