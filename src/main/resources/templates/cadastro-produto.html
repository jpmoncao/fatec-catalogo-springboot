<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Novo produto — Catálogo')}">
    <title>Novo produto</title>
</head>

<body class="app-body">
<div class="app-shell">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <div class="app-shell__main"
         th:with="formDesc='Preencha nome, preço e categoria. Campos obrigatórios estão marcados.'">
        <header th:replace="~{fragments/layout :: mainTopbar}"></header>
        <header th:replace="~{fragments/layout :: contentHeader('Novo produto', ${formDesc})}"></header>

        <main class="page page--narrow">
            <div class="card">
                <div class="card__header">
                    <h2 class="card__heading">Dados do produto</h2>
                </div>
                <div class="card__body">
                    <form th:action="@{/produtos/salvar}" method="post" th:object="${produto}">
                        <div class="field">
                            <label for="nome">Nome do produto</label>
                            <input type="text" th:field="*{nome}" id="nome" placeholder="Digite o nome" required>
                        </div>
                        <div class="field">
                            <label for="valor">Preço (R$)</label>
                            <input type="number" step="0.01" th:field="*{valor}" id="valor" placeholder="0,00" required>
                        </div>
                        <div class="field">
                            <label for="categoria">Categoria</label>
                            <select id="categoria" th:field="*{categoria.idCategoria}" required>
                                <option value="">Selecione uma categoria</option>
                                <option th:each="c : ${categorias}" th:value="${c.idCategoria}" th:text="${c.nome}">
                                </option>
                            </select>
                        </div>
                        <div th:if="${erro}" class="alert alert--error">
                            <span th:text="${erro}"></span>
                        </div>
                        <div th:if="${#fields.hasErrors('nome')}" class="field-error" th:errors="*{nome}"></div>
                        <div th:if="${#fields.hasErrors('valor')}" class="field-error" th:errors="*{valor}"></div>
                        <div th:if="${#fields.hasErrors('categoria')}" class="field-error" th:errors="*{categoria}"></div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn--success">Salvar produto</button>
                            <a th:href="@{/produtos}">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>
</body>

</html>
