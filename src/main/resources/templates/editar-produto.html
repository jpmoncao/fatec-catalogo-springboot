<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Editar produto — Catálogo')}">
    <title>Editar produto</title>
</head>
<body class="app-body">
<div class="app-shell">
    <aside th:replace="~{fragments/layout :: sidebar}"></aside>
    <div class="app-shell__main"
         th:with="formDesc='Altere os dados e salve para atualizar o catálogo.'">
        <header th:replace="~{fragments/layout :: mainTopbar}"></header>
        <header th:replace="~{fragments/layout :: contentHeader('Editar produto', ${formDesc})}"></header>

        <main class="page page--narrow">
            <div class="card">
                <div class="card__header">
                    <h2 class="card__heading">Dados do produto</h2>
                </div>
                <div class="card__body">
                    <form th:action="@{/produtos/salvar}" method="post" th:object="${produto}">
                        <input type="hidden" th:field="*{idProduto}"/>

                        <div class="field">
                            <label for="nome">Nome</label>
                            <input id="nome" type="text" th:field="*{nome}" required>
                        </div>

                        <div class="field">
                            <label for="valor">Valor (R$)</label>
                            <input id="valor" type="number" step="0.01" th:field="*{valor}" required>
                        </div>

                        <div class="field">
                            <label for="categoria">Categoria</label>
                            <select id="categoria" th:field="*{categoria.idCategoria}" required>
                                <option value="">Selecione uma categoria</option>
                                <option th:each="c : ${categorias}" th:value="${c.idCategoria}" th:text="${c.nome}">
                                </option>
                            </select>
                        </div>

                        <div th:if="${#fields.hasErrors('categoria')}" class="field-error" th:errors="*{categoria}"></div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn--success">Atualizar</button>
                            <a th:href="@{/produtos}">Voltar</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</div>
</body>
</html>
